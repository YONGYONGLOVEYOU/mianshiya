version: '3.8'

services:
  redis:
    image: redis:6-alpine
    container_name: mianshiya-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mianshiya-network
    command: redis-server --appendonly yes

  elasticsearch:
    image: elasticsearch:7.14.0
    container_name: mianshiya-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - mianshiya-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mianshiya-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - mianshiya-network
    volumes:
      - ./server/src/config/config.local.js:/usr/src/app/src/config/config.local.js

  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: mianshiya-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mianshiya-network

volumes:
  redis_data:
  es_data:

networks:
  mianshiya-network:
    driver: bridge
